name: Appadvent

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image on GitHub runner
              uses: docker/build-push-action@v5
              with:
                  context: .
                  load: true
                  tags: |
                      appadvent:${{ github.sha }}
                      appadvent:latest

            - name: Export image archive
              run: docker save appadvent:${{ github.sha }} -o appadvent-image.tar

            - name: Upload image artifact
              uses: actions/upload-artifact@v4
              with:
                  name: appadvent-image
                  path: appadvent-image.tar
                  retention-days: 1

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download image artifact
              uses: actions/download-artifact@v4
              with:
                  name: appadvent-image
                  path: .

            - name: Copy image to private server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  source: appadvent-image.tar
                  target: /tmp

            - name: Deploy on private server
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      docker load -i /tmp/appadvent-image.tar
                      docker rm -f appadvent || true
                      docker run -d \
                          --name appadvent \
                          --restart always \
                          -p 3005:3000 \
                          appadvent:${{ github.sha }}
                      rm -f /tmp/appadvent-image.tar
